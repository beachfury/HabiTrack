<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <circle cx="200" cy="200" r="200" fill="#DC143C"/>
  <!-- Beret -->
  <ellipse cx="200" cy="135" rx="80" ry="35" fill="#2C2C2C"/>
  <circle cx="200" cy="120" r="60" fill="#2C2C2C"/>
  <circle cx="200" cy="95" r="10" fill="#2C2C2C"/>
  <!-- Beret tilt accent -->
  <circle cx="240" cy="110" r="15" fill="#333"/>
  <!-- Face -->
  <circle cx="200" cy="215" r="72" fill="#F5D0A9"/>
  <!-- Eyes -->
  <circle cx="175" cy="205" r="10" fill="#2C3E50"/>
  <circle cx="225" cy="205" r="10" fill="#2C3E50"/>
  <circle cx="178" cy="202" r="4" fill="#FFF"/>
  <circle cx="228" cy="202" r="4" fill="#FFF"/>
  <!-- Eyebrows (one raised) -->
  <path d="M160 190 Q175 182 190 190" stroke="#6B4226" stroke-width="3" fill="none"/>
  <path d="M210 186 Q225 178 240 190" stroke="#6B4226" stroke-width="3" fill="none"/>
  <!-- Thin mustache -->
  <path d="M178 232 Q190 226 200 232 Q210 226 222 232" stroke="#6B4226" stroke-width="2.5" fill="none"/>
  <!-- Smile -->
  <path d="M185 242 Q200 254 215 242" stroke="#C0392B" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Paint palette -->
  <ellipse cx="310" cy="310" rx="55" ry="40" fill="#D2914A" transform="rotate(-20 310 310)"/>
  <circle cx="290" cy="295" r="8" fill="#E74C3C"/>
  <circle cx="310" cy="290" r="8" fill="#3498DB"/>
  <circle cx="328" cy="298" r="8" fill="#F1C40F"/>
  <circle cx="305" cy="315" r="8" fill="#2ECC71"/>
  <!-- Thumb hole -->
  <circle cx="320" cy="325" r="10" fill="#DC143C"/>
  <!-- Paintbrush -->
  <line x1="90" y1="320" x2="160" y2="280" stroke="#8B6914" stroke-width="6" stroke-linecap="round"/>
  <polygon points="160,280 170,268 178,278 168,285" fill="#3498DB"/>
</svg>