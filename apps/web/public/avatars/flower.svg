  <ellipse cx="235" cy="320" rx="30" ry="12" fill="#2ECC71" transform="rotate(25 235 320)"/>
  <!-- Petals -->
  <ellipse cx="200" cy="130" rx="28" ry="45" fill="#FF85C0"/>
