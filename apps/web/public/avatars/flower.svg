  <ellipse cx="145" cy="185" rx="45" ry="28" fill="#FF85C0"/>
  <ellipse cx="255" cy="185" rx="45" ry="28" fill="#FF85C0"/>
  <!-- Diagonal petals -->
  <ellipse cx="155" cy="140" rx="28" ry="42" fill="#FF9FD0" transform="rotate(45 155 140)"/>
  <ellipse cx="245" cy="140" rx="28" ry="42" fill="#FF9FD0" transform="rotate(-45 245 140)"/>
  <ellipse cx="155" cy="230" rx="28" ry="42" fill="#FF9FD0" transform="rotate(-45 155 230)"/>
  <ellipse cx="245" cy="230" rx="28" ry="42" fill="#FF9FD0" transform="rotate(45 245 230)"/>
